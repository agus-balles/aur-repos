name: Update AUR packages (llmfit + llmfit-bin)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install deps
        run: |
          set -e
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git openssh curl jq pacman-contrib rsync

      - name: Create build user
        run: |
          set -e
          useradd -m -u 1000 builder || true
          passwd -d builder || true
          mkdir -p /home/builder/.ssh
          chown -R builder:builder /home/builder

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$(pwd)"

      - name: Git identity
        run: |
          git config --global user.name "aur-bot"
          git config --global user.email "aur-bot@users.noreply.github.com"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          mkdir -p /root/.ssh
          chmod 700 /root/.ssh

          # Write key
          echo "$AUR_SSH_PRIVATE_KEY" > /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519

          # Create known_hosts and pin AUR host key
          touch /root/.ssh/known_hosts
          chmod 600 /root/.ssh/known_hosts
          ssh-keyscan -H aur.archlinux.org >> /root/.ssh/known_hosts

          # Force git/ssh to use exactly this key + known_hosts
          echo "GIT_SSH_COMMAND=ssh -i /root/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/root/.ssh/known_hosts" >> $GITHUB_ENV

          # Sanity check (should print a greeting or permission denied, but NOT host key failure)
          $GIT_SSH_COMMAND -T aur@aur.archlinux.org 2>&1 | head -n 30 || true

      - name: Update both PKGBUILDs + SRCINFO
        run: |
          set -e
          chown -R builder:builder "$GITHUB_WORKSPACE"
          # Make sure script is executable
          chmod +x ./scripts/update_both.sh
          su - builder -c "cd '$GITHUB_WORKSPACE' && ./scripts/update_both.sh"

      - name: Commit (if changed)
        id: commit
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes."
            exit 0
          fi

          ver="$(awk -F= '$1=="pkgver"{print $2}' llmfit/PKGBUILD)"
          git add llmfit/PKGBUILD llmfit/.SRCINFO llmfit-bin/PKGBUILD llmfit-bin/.SRCINFO

          # In case something else modified those files but still no staged diff:
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No staged changes."
            exit 0
          fi

          git commit -m "Update llmfit packages to ${ver}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push to GitHub (best effort)
        if: steps.commit.outputs.changed == 'true'
        run: |
          git push || true

      - name: Push llmfit to AUR (best effort)
        if: steps.commit.outputs.changed == 'true'
        run: |
          set -euo pipefail

          msg="$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=%B)"

          rm -rf /tmp/aur_llmfit
          if ! git clone "ssh://aur@aur.archlinux.org/llmfit.git" /tmp/aur_llmfit; then
            echo "WARN: failed to clone llmfit AUR repo; skipping."
            exit 0
          fi

          rsync -av --delete --exclude '.git' "$GITHUB_WORKSPACE/llmfit/" /tmp/aur_llmfit/
          cd /tmp/aur_llmfit

          git config user.name "aur-bot"
          git config user.email "aur-bot@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "llmfit: already up to date."
            exit 0
          fi

          git commit -m "$msg" || true
          git push || true

      - name: Push llmfit-bin to AUR (best effort)
        if: steps.commit.outputs.changed == 'true'
        run: |
          set -euo pipefail

          msg="$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=%B)"

          rm -rf /tmp/aur_llmfit_bin
          if ! git clone "ssh://aur@aur.archlinux.org/llmfit-bin.git" /tmp/aur_llmfit_bin; then
            echo "WARN: failed to clone llmfit-bin AUR repo; skipping."
            exit 0
          fi

          rsync -av --delete --exclude '.git' "$GITHUB_WORKSPACE/llmfit-bin/" /tmp/aur_llmfit_bin/
          cd /tmp/aur_llmfit_bin

          git config user.name "aur-bot"
          git config user.email "aur-bot@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "llmfit-bin: already up to date."
            exit 0
          fi

          git commit -m "$msg" || true
          git push || true
