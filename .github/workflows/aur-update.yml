name: Update AUR Package Metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: aur-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git openssh curl jq pacman-contrib

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create non-root user for makepkg
        run: |
          set -euo pipefail
          id -u builder >/dev/null 2>&1 || useradd -m -u 1000 builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Mark workspace as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${AUR_SSH_PRIVATE_KEY:?AUR_SSH_PRIVATE_KEY secret is required}"

          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519

          ssh-keyscan -H aur.archlinux.org > /root/.ssh/known_hosts
          chmod 600 /root/.ssh/known_hosts

          SSH_CMD="ssh -i /root/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/root/.ssh/known_hosts"
          echo "GIT_SSH_COMMAND=${SSH_CMD}" >> "$GITHUB_ENV"

          # Sanity check connectivity/auth; ignore non-zero to avoid false negatives on banner output.
          ${SSH_CMD} -T aur@aur.archlinux.org 2>&1 | head -n 20 || true

      - name: Update PKGBUILDs and SRCINFO
        run: |
          set -euo pipefail
          chmod +x ./scripts/update_packages.sh
          runuser -u builder -- bash -lc "cd '$GITHUB_WORKSPACE' && ./scripts/update_packages.sh"

      - name: Commit and push updates to GitHub
        id: github_push
        run: |
          set -euo pipefail

          mapfile -t package_dirs < <(
            find "$GITHUB_WORKSPACE" -mindepth 2 -maxdepth 2 -name PKGBUILD -printf '%h\n' \
              | sed "s#^$GITHUB_WORKSPACE/##" \
              | sort
          )

          git config user.name "aur-bot"
          git config user.email "aur-bot@users.noreply.github.com"

          for pkg in "${package_dirs[@]}"; do
            git add "$pkg/PKGBUILD"
            if [[ -f "$pkg/.SRCINFO" ]]; then
              git add "$pkg/.SRCINFO"
            fi
          done

          if git diff --cached --quiet; then
            echo "No GitHub changes to push."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: update package metadata"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push updates to AUR repos
        if: steps.github_push.outputs.changed == 'true'
        run: |
          set -euo pipefail
          unset GIT_DIR GIT_WORK_TREE

          mapfile -t package_dirs < <(
            find "$GITHUB_WORKSPACE" -mindepth 2 -maxdepth 2 -name PKGBUILD -printf '%h\n' \
              | sed "s#^$GITHUB_WORKSPACE/##" \
              | sort
          )

          changed_any=false
          for pkg in "${package_dirs[@]}"; do
            repo="/tmp/aur_${pkg}"
            rm -rf "$repo"

            echo "==> Syncing ${pkg}"
            git clone "https://aur.archlinux.org/${pkg}.git" "$repo"
            git -C "$repo" remote set-url origin "ssh://aur@aur.archlinux.org/${pkg}.git"
            test -d "$repo/.git"
            cp "$GITHUB_WORKSPACE/$pkg/PKGBUILD" "$repo/PKGBUILD"
            cp "$GITHUB_WORKSPACE/$pkg/.SRCINFO" "$repo/.SRCINFO"

            git -C "$repo" config user.name "aur-bot"
            git -C "$repo" config user.email "aur-bot@users.noreply.github.com"
            git -C "$repo" add PKGBUILD .SRCINFO

            if git -C "$repo" diff --cached --quiet; then
              echo "${pkg}: no changes."
              continue
            fi

            ver="$(awk -F= '$1=="pkgver"{print $2}' "$GITHUB_WORKSPACE/$pkg/PKGBUILD")"
            git -C "$repo" commit -m "${pkg}: update to ${ver}"
            git -C "$repo" push
            changed_any=true
          done

          if [[ "$changed_any" == "false" ]]; then
            echo "No AUR updates were needed."
          fi
